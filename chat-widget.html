<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anura Connect - Epic Consultant Chat</title>
  <style>
    /* ============================================
       ANURA CONNECT CHAT WIDGET
       Embed this on any page via <script> or iframe
       ============================================ */

    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Nunito+Sans:wght@400;500;600&display=swap');

    :root {
      --anura-primary: #0e2e47;
      --anura-primary-light: #176087;
      --anura-accent: #53a2be;
      --anura-accent-light: #7bbdd4;
      --anura-accent-dark: #176087;
      --anura-peach: #f5e6dc;
      --anura-bg: #fafafa;
      --anura-white: #ffffff;
      --anura-text: #0e2e47;
      --anura-text-light: #596e8a;
      --anura-border: #e0e4e8;
      --anura-error: #c0392b;
      --anura-warning: #e67e22;
      --anura-shadow: 0 4px 24px rgba(14, 46, 71, 0.15);
      --anura-radius: 12px;
      --anura-radius-sm: 8px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: var(--anura-bg);
      color: var(--anura-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* --- Floating launcher button (for embedded use) --- */
    #anura-chat-launcher {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--anura-primary);
      border: 2px solid var(--anura-accent);
      cursor: pointer;
      box-shadow: var(--anura-shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 9998;
      padding: 0;
      overflow: hidden;
    }

    #anura-chat-launcher:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 32px rgba(23, 96, 135, 0.3);
    }

    /* --- Chat container --- */
    #anura-chat-container {
      position: fixed;
      bottom: 100px;
      right: 24px;
      width: 420px;
      max-width: calc(100vw - 32px);
      height: 620px;
      max-height: calc(100vh - 140px);
      background: var(--anura-white);
      border-radius: var(--anura-radius);
      box-shadow: var(--anura-shadow);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 9999;
      animation: slideUp 0.3s ease-out;
    }

    #anura-chat-container.open {
      display: flex;
    }

    /* For standalone page mode */
    #anura-chat-container.standalone {
      position: relative;
      bottom: auto;
      right: auto;
      width: 480px;
      height: 680px;
      display: flex;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* --- Header --- */
    .anura-header {
      background: var(--anura-white);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--anura-border);
    }

    .anura-header-logo {
      height: 36px;
      width: auto;
      flex-shrink: 0;
    }

    .anura-header-info {
      flex: 1;
    }

    .anura-header-title {
      color: var(--anura-primary);
      font-size: 16px;
      font-weight: 600;
    }

    .anura-header-subtitle {
      color: var(--anura-text-light);
      font-family: 'Manrope', sans-serif;
      font-size: 12px;
      font-weight: 500;
      margin-top: 2px;
    }

    .anura-header-close {
      background: none;
      border: none;
      color: var(--anura-text-light);
      cursor: pointer;
      padding: 4px;
      font-size: 20px;
      line-height: 1;
      transition: color 0.2s;
    }

    .anura-header-close:hover {
      color: var(--anura-primary);
    }

    /* --- Messages area --- */
    .anura-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .anura-messages::-webkit-scrollbar {
      width: 6px;
    }

    .anura-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .anura-messages::-webkit-scrollbar-thumb {
      background: var(--anura-border);
      border-radius: 3px;
    }

    /* --- Message bubbles --- */
    .anura-msg {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: var(--anura-radius-sm);
      font-size: 14px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .anura-msg.bot {
      background: var(--anura-bg);
      color: var(--anura-text);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .anura-msg.user {
      background: var(--anura-primary-light);
      color: var(--anura-white);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .anura-msg.system {
      background: #fef3e2;
      color: var(--anura-warning);
      align-self: center;
      text-align: center;
      font-size: 13px;
      border-radius: 8px;
      max-width: 90%;
    }

    .anura-msg.error {
      background: #fde8e6;
      color: var(--anura-error);
      align-self: center;
      text-align: center;
      font-size: 13px;
    }

    /* --- Typing indicator --- */
    .anura-typing {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      align-self: flex-start;
      background: var(--anura-bg);
      border-radius: var(--anura-radius-sm);
      border-bottom-left-radius: 4px;
    }

    .anura-typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--anura-text-light);
      animation: typingBounce 1.4s infinite;
    }

    .anura-typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .anura-typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* --- Quick reply chips --- */
    .anura-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px 0;
      align-self: flex-start;
      max-width: 90%;
    }

    .anura-chip {
      background: var(--anura-white);
      border: 1.5px solid var(--anura-accent);
      color: var(--anura-primary);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .anura-chip:hover {
      background: var(--anura-primary-light);
      color: var(--anura-white);
    }

    /* --- Input area --- */
    .anura-input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--anura-border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
      background: var(--anura-white);
    }

    .anura-input-area textarea {
      flex: 1;
      border: 1.5px solid var(--anura-border);
      border-radius: var(--anura-radius-sm);
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 42px;
      max-height: 100px;
      line-height: 1.4;
      outline: none;
      transition: border-color 0.2s;
      color: var(--anura-text);
    }

    .anura-input-area textarea:focus {
      border-color: var(--anura-accent);
    }

    .anura-input-area textarea::placeholder {
      color: var(--anura-text-light);
    }

    .anura-send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--anura-primary);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    .anura-send-btn:hover {
      background: var(--anura-primary-light);
    }

    .anura-send-btn:active {
      transform: scale(0.95);
    }

    .anura-send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .anura-send-btn svg {
      width: 18px;
      height: 18px;
      fill: var(--anura-white);
    }

    /* --- File upload button --- */
    .anura-upload-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: transparent;
      border: 1.5px solid var(--anura-border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .anura-upload-btn:hover {
      border-color: var(--anura-accent);
      background: var(--anura-bg);
    }

    .anura-upload-btn svg {
      width: 18px;
      height: 18px;
      fill: var(--anura-text-light);
    }

    .anura-upload-btn:hover svg {
      fill: var(--anura-accent);
    }

    .anura-file-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--anura-bg);
      border: 1px solid var(--anura-border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--anura-text-light);
      margin: 0 16px 4px;
    }

    .anura-file-badge .file-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .anura-file-badge .file-remove {
      cursor: pointer;
      font-weight: bold;
      color: var(--anura-error);
      padding: 0 2px;
    }

    /* --- Powered by footer --- */
    .anura-footer {
      text-align: center;
      padding: 8px;
      font-size: 11px;
      color: var(--anura-text-light);
      border-top: 1px solid var(--anura-border);
      flex-shrink: 0;
    }

    /* --- Responsive --- */
    @media (max-width: 480px) {
      #anura-chat-container {
        width: 100vw;
        height: 100vh;
        max-height: 100vh;
        bottom: 0;
        right: 0;
        border-radius: 0;
      }

      #anura-chat-launcher {
        bottom: 16px;
        right: 16px;
      }
    }
  </style>
</head>
<body>

  <!-- Floating launcher button -->
  <button id="anura-chat-launcher" onclick="toggleChat()" aria-label="Open chat">
    <img src="https://images.squarespace-cdn.com/content/v1/671fb0d9fec6997ddc5025cd/92f20ce5-ff1c-4261-b22c-447860ad3f25/icononly_nobuffer.png?format=100w" alt="Chat" style="width:40px;height:40px;border-radius:50%;object-fit:contain;">
  </button>

  <!-- Chat widget -->
  <div id="anura-chat-container">
    <div class="anura-header">
      <img src="https://images.squarespace-cdn.com/content/v1/671fb0d9fec6997ddc5025cd/79107203-ad2e-4d39-96a6-5faa3f2f70bf/fulllogo_transparent_nobuffer.png?format=300w" alt="Anura Connect" class="anura-header-logo">
      <div class="anura-header-info">
        <div class="anura-header-title">Chat with Leap</div>
        <div class="anura-header-subtitle">Your Epic Career Guide</div>
      </div>
      <button class="anura-header-close" onclick="toggleChat()" aria-label="Close chat">&times;</button>
    </div>

    <div class="anura-messages" id="anura-messages"></div>

    <div id="anura-file-badge-area"></div>
    <div class="anura-input-area">
      <input type="file" id="anura-file-input" accept=".pdf,.doc,.docx,.txt" style="display:none" onchange="handleFileSelect(this)">
      <button class="anura-upload-btn" onclick="document.getElementById('anura-file-input').click()" aria-label="Attach resume" title="Attach your resume">
        <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5a4 4 0 0 1-8 0V5a2.5 2.5 0 0 1 5 0v10.5a1 1 0 0 1-2 0V6h-1.5v9.5a2.5 2.5 0 0 0 5 0V5a4 4 0 0 0-8 0v12.5a5.5 5.5 0 0 0 11 0V6H16.5z"/></svg>
      </button>
      <textarea id="anura-input"
                placeholder="Type your message..."
                rows="1"
                onkeydown="handleKeydown(event)"
                oninput="autoResize(this)"></textarea>
      <button class="anura-send-btn" id="anura-send" onclick="sendMessage()" aria-label="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>

    <div class="anura-footer">anuraconnect.com</div>
  </div>

  <script>
    // ============================================
    // CONFIGURATION - Update these for your setup
    // ============================================
    const CONFIG = {
      // Your backend API endpoint (see server.js)
      apiUrl: 'https://anurachat-production.up.railway.app/api/chat',

      // Notification email
      notifyEmail: 'hello@anuraconnect.com',

      // Set to true if embedding as widget, false for standalone page
      widgetMode: true,
    };

    // ============================================
    // SYSTEM PROMPT - The brain of your agent
    // ============================================
    const SYSTEM_PROMPT = `You are Leap — the chat assistant for Anura Connect, named after the Anura frog mascot. You're chatting with Epic consultants who were sent this link by someone on the Anura team. This is COLD OUTREACH — they didn't come to you, you came to them. They probably don't know Anura and aren't actively looking. Your job is to hook them fast with something they care about (what the market looks like for their modules, rate transparency, what they could be making) and get their info before they bounce. If someone asks your name, tell them you're Leap.

## YOUR CONVERSATION FLOW

You're warm but efficient. Respect their time. Get to the point, then build the relationship.

Remember: they didn't seek you out. Someone on the team sent them a link. You have a small window before they close the tab. Every message needs to either give them something valuable or move toward getting their info. Don't waste messages on fluff.

**Message 1 (greeting):** Already sent. It acknowledges someone sent them the link, drops the rate transparency hook, and asks what Epic apps they're in. Leads with value AND asks for info.
**Message 2 (they respond with their apps/modules):** Give them something they can't get elsewhere — what the market looks like for their specific modules right now. Be specific: "Beaker is on fire right now" or "Rev cycle is always steady." Then ask: are they on a contract right now or between gigs? When are they available?
**Message 3:** Ask if they came out of Epic or the consulting side, and what kind of role they want next (analyst, PM, director, team lead). Keep giving value — relate their situation to what Anura is seeing.
**Message 4:** Ask for a resume or LinkedIn. Be direct: "If you drop your resume or LinkedIn here I can get your profile set up with the right apps and certs — that way when something hits for your modules, we can move fast." If they don't have one handy, ask them to list their primary certifications.
**Message 5:** Get their name and contact info. "What's the best way to reach you — email or cell?"
**Message 6+:** Answer questions, share more about Anura's benefits, make warm handoffs to team members.

The goal: by message 5 you have their apps/certs, availability, ex-Epic status, role type, resume or LinkedIn, and contact info. That's a complete Bullhorn record. Everything after that is relationship building.

## STYLE RULES

- Short, casual messages. 1-3 sentences max. This is chat, not email.
- React genuinely but briefly — then move the conversation forward.
- ONE question at a time. Never stack questions.
- Share useful market intel when relevant.
- Use casual language: "Oh nice." "Gotcha." "No kidding." "That's solid."
- Match their energy. Brief for brief, chatty for chatty.

NEVER say:
- "I'd love to learn more about your experience"
- "Could you tell me about your background?"
- "What are your career goals?"
- Anything that sounds like a recruiter script or HR intake form

## WHAT YOU MUST LEARN (in priority order)

1. **Are they ex-Epic?** Did they work at Epic before becoming a consultant? This affects placement. Ask early — "Did you come out of Epic or did you come in from the consulting side?"
2. **Availability date.** When are they coming off their current contract? Already available? Can they overlap? This is the #1 operational question.
3. **What roles/modules they want.** Analyst, PM, director, team lead — and in which Epic applications.
4. **Their certifications and primary applications.** This is what goes into Bullhorn. You need specific Epic app names — Ambulatory, ClinDoc, Beaker, Willow, Radiant, OpTime, Resolute PB/HB, etc. If they share a resume, pull these out. If not, ask directly.
5. **Resume or LinkedIn profile.** Ask them to attach a resume or paste their LinkedIn URL. This is how the team gets the full picture and sets up their Bullhorn profile correctly. Frame it as: "this way we can make sure your certs and apps are right."
6. **Rate transparency pitch.** Once you know they're a real candidate, tell them about Anura's 1/3-2/3 split. This is a differentiator — most firms won't tell you what the client pays. Anura shows you the bill rate and your take-home. No hidden margins.
7. **Contact info.** Name, email or phone. This closes the loop so the team can follow up.
8. **Pay rate expectations.** What they want for take-home (hourly), W2 or 1099 preference.
9. **Experience level.** Go-lives, years in Epic, notable projects. Often comes from the resume.

## GIVE VALUE — DON'T JUST TAKE

The Epic market is shifting. Use what you know to make this worth their time:

- Rev cycle is consistently in demand
- Beaker has been really hot lately
- PM roles are growing — Epic is rolling out agentic AI / AI factory to health systems, creating more need for people who can oversee AI initiatives
- Epic is expanding into life sciences and payer spaces
- Some modules are crazy hot right now, others have cooled off
- A lot of consultants don't realize how much of their bill rate gets eaten by overhead at the big firms
- The market has seen tons of acquisitions — not many small firms left

Share this when it's relevant to what they tell you. Be a useful conversation partner.

## ABOUT ANURA (weave in when it fits — this is your ammunition)

**The Story:**
- Founded by former Epic, Bluetree, and Nordic leaders. Rachel Neill (President) was one of the first 10 people at Nordic. Bill Neill is CEO.
- They saw the Epic market getting consolidated — lots of acquisitions, quality dropping, firms just warm-bodying seats. They started Anura to bring it back old school.
- Woman + minority-owned business. Independent firm, not beholden to shareholders.
- Also run Carex Consulting Group for non-Epic health tech staffing (Abridge, Rhythm, Tiger Connect, etc.)

**Why consultants love it (use these when talking about money/benefits):**
- Transparent margins: 1/3 to 2/3 split of the bill rate. You see what the client pays and what you take home. No games.
- Higher take-home pay than the big firms because of lean operations — no fancy marketing, no SWAG, no UGM parties, no unnecessary middle management eating into your rate.
- Flexible roles: full-time or fractional. You choose the contracts that work for your life.
- They even allow direct hires — if you're a perfect match for a client, you can transition to full-time seamlessly.

**Benefits (these are real differentiators — most consulting firms have garbage benefits):**
- ICHRA health plan: pick any marketplace plan you want, Anura contributes $620/month. You keep your plan even between contracts — no COBRA hassle.
- Delta Dental coverage (preventive 100%, basic 80%, major 50%). Employee only is like $10/semi-monthly.
- Delta Vision plan — super cheap, under $2/semi-monthly.
- 401(k) through Guideline with pre-tax AND Roth options, potential employer match. Higher ROTH contribution limits than a private account. Auto-enrolled.
- FSA for medical and dependent care expenses.
- Employee Directed Charitable Giving — you pick a cause, Anura contributes on your behalf.
- HausKey advocacy service to help with claims, billing, finding providers.

**The team (name-drop when relevant):**
- Rachel Neill — President, former Nordic exec, one of the first 10 at Nordic
- Bill Neill — CEO, former Epic employee turned consultant
- Ben Gray — VP Business Development, former Epic ambulatory consultant who worked in California for years. Great person to connect ambulatory candidates with.
- Nicole Meidinger — Chief Revenue Officer, manages client accounts
- Melissa Alfiero — VP Business Development
- Peter Oppermann — VP Business Development
- Daniel Neill — Director of Finance & Operations
- Suzie Hall — Candidate Experience Director

**What they do:**
- Epic Implementations and Rollouts
- Epic Refuels/Optimization Projects
- Epic Upgrades
- Epic Maintenance and Support
- Epic Training
- Specialized Epic Projects (Automation/AI)
- Full-Time and Fractional Consultant Support
- All major modules: OpTime/Anesthesia, Resolute PB/HB, Beaker, Ambulatory, Inpatient, and more

Don't dump all of this at once. Share pieces when they're relevant — benefits when someone asks about perks, the money angle when talking rates, team members when you want to make a warm handoff feel real.

## WHEN THEY SHARE A RESUME OR LINKEDIN

Candidates can attach a resume (PDF, Word, TXT) or paste a LinkedIn URL. When they do:

- Actually read it. Reference specific things — their last project, a certification, a cool employer.
- React like Rachel would: "Oh nice, you were at [health system]? That's a solid build."
- Use what you learn to steer the conversation — if you see they're certified in Beaker, mention how hot that market is right now.
- Don't summarize their resume back to them bullet by bullet. Pick out the 1-2 most interesting things and riff on those.
- If the resume fills in info you haven't asked yet (certs, experience, name), great — acknowledge it and move on to what's still missing (availability, rate, contact info).
- If they paste a LinkedIn URL but you can't see the full profile, say something like: "Got your LinkedIn — I'll make sure the team checks it out. In the meantime, what are you working on right now?"

The goal is to make them feel like you actually looked at their stuff, not like it went into a black hole.

## THE ONE HARD RULE

If they're a Credentialed Trainer (CT) or ATE specialist — Anura doesn't place those. Be cool: "Ah gotcha — we're focused on the certified consultant side right now, so we don't have CT/ATE placements. That could change down the road though. Appreciate you chatting!" Then wrap up.

## WRAPPING UP

Keep it casual: "This is really helpful — I'm gonna pass this along to the team and get you connected with the right person. What's the best way to reach you?"

You can name-drop team members: "I think Ben Gray would be great for you to talk to — he's our ambulatory guy." This makes it feel real.

If they already gave contact info: "Awesome — someone from the team will be in touch soon. Really glad you took a few minutes to chat."

Same vibe the whole way through. Never get stiff at the end.`;

    // ============================================
    // CHAT STATE
    // ============================================
    let conversationHistory = [];
    let candidateData = {
      name: null,
      email: null,
      phone: null,
      exEpic: null,
      roleType: null,
      payRate: null,
      availability: null,
      epicCertifications: [],
      experience: null,
      resumeOrLinkedIn: null,
      disqualified: false,
      disqualifyReason: null,
    };
    let isProcessing = false;
    let conversationComplete = false;

    // ============================================
    // UI FUNCTIONS
    // ============================================

    function toggleChat() {
      const container = document.getElementById('anura-chat-container');
      const launcher = document.getElementById('anura-chat-launcher');

      if (container.classList.contains('open')) {
        container.classList.remove('open');
        launcher.style.display = 'flex';
      } else {
        container.classList.add('open');
        launcher.style.display = 'none';

        // Send initial greeting on first open
        if (conversationHistory.length === 0) {
          sendBotGreeting();
        }
      }
    }

    function addMessage(text, type = 'bot') {
      const messagesEl = document.getElementById('anura-messages');
      const msgEl = document.createElement('div');
      msgEl.className = `anura-msg ${type}`;
      msgEl.textContent = text;
      messagesEl.appendChild(msgEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return msgEl;
    }

    function addChips(options) {
      const messagesEl = document.getElementById('anura-messages');
      const chipsEl = document.createElement('div');
      chipsEl.className = 'anura-chips';

      options.forEach(option => {
        const chip = document.createElement('button');
        chip.className = 'anura-chip';
        chip.textContent = option;
        chip.onclick = () => {
          // Remove chips after selection
          chipsEl.remove();
          // Send as user message
          document.getElementById('anura-input').value = option;
          sendMessage();
        };
        chipsEl.appendChild(chip);
      });

      messagesEl.appendChild(chipsEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const messagesEl = document.getElementById('anura-messages');
      const typingEl = document.createElement('div');
      typingEl.className = 'anura-typing';
      typingEl.id = 'anura-typing-indicator';
      typingEl.innerHTML = `
        <div class="anura-typing-dot"></div>
        <div class="anura-typing-dot"></div>
        <div class="anura-typing-dot"></div>
      `;
      messagesEl.appendChild(typingEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('anura-typing-indicator');
      if (el) el.remove();
    }

    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
    }

    function handleKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function setInputEnabled(enabled) {
      const input = document.getElementById('anura-input');
      const sendBtn = document.getElementById('anura-send');
      input.disabled = !enabled;
      sendBtn.disabled = !enabled;
      if (enabled) input.focus();
    }

    // ============================================
    // FILE UPLOAD & LINKEDIN DETECTION
    // ============================================
    let pendingFile = null;

    function handleFileSelect(input) {
      const file = input.files[0];
      if (!file) return;

      // Validate size (10MB)
      if (file.size > 10 * 1024 * 1024) {
        addMessage('That file is too large — keep it under 10MB.', 'error');
        input.value = '';
        return;
      }

      pendingFile = file;
      showFileBadge(file.name);
    }

    function showFileBadge(filename) {
      const area = document.getElementById('anura-file-badge-area');
      area.innerHTML = `
        <div class="anura-file-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 2l5 5h-5V4zM6 20V4h5v7h7v9H6z"/></svg>
          <span class="file-name">${filename}</span>
          <span class="file-remove" onclick="clearPendingFile()">&times;</span>
        </div>
      `;
    }

    function clearPendingFile() {
      pendingFile = null;
      document.getElementById('anura-file-badge-area').innerHTML = '';
      document.getElementById('anura-file-input').value = '';
    }

    async function uploadResume(file) {
      const formData = new FormData();
      formData.append('resume', file);

      const baseUrl = CONFIG.apiUrl.replace('/api/chat', '');
      const response = await fetch(`${baseUrl}/api/upload-resume`, {
        method: 'POST',
        body: formData,
      });

      if (!response.ok) throw new Error('Upload failed');
      return await response.json();
    }

    function detectLinkedInUrl(text) {
      const match = text.match(/https?:\/\/(www\.)?linkedin\.com\/in\/[^\s]+/i);
      return match ? match[0] : null;
    }

    async function captureLinkedIn(url) {
      const baseUrl = CONFIG.apiUrl.replace('/api/chat', '');
      const response = await fetch(`${baseUrl}/api/fetch-linkedin`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });

      if (!response.ok) throw new Error('LinkedIn capture failed');
      return await response.json();
    }

    // ============================================
    // CONVERSATION LOGIC
    // ============================================

    async function sendBotGreeting() {
      showTyping();

      // Small delay to feel natural
      await sleep(800);

      hideTyping();

      const greeting = "Hey! I'm Leap — someone from the Anura Connect team sent you this because they think you could be a great fit. We're one of the few independent Epic firms left, and we do things differently: you see the full bill rate upfront, not just your cut. Quick question — what Epic apps are you certified in? I can tell you exactly what we're seeing in the market for your modules.";

      addMessage(greeting, 'bot');

      // Add the greeting to conversation history
      conversationHistory.push({
        role: 'assistant',
        content: greeting
      });

      // Show quick-start chips
      // No chips — let the conversation flow naturally
    }

    async function sendMessage() {
      const input = document.getElementById('anura-input');
      const text = input.value.trim();

      if ((!text && !pendingFile) || isProcessing || conversationComplete) return;

      // Add user message to UI
      const displayText = text || '(attached resume)';
      addMessage(displayText, 'user');
      input.value = '';
      input.style.height = 'auto';

      // Remove any existing chips
      document.querySelectorAll('.anura-chips').forEach(el => el.remove());

      // Build the message content that goes to the AI
      let messageContent = text;

      // Process with AI
      isProcessing = true;
      setInputEnabled(false);
      showTyping();

      try {
        // Handle file upload if one is pending
        if (pendingFile) {
          try {
            const uploadResult = await uploadResume(pendingFile);
            if (uploadResult.success && uploadResult.resumeText) {
              const resumeContext = `[Candidate shared their resume: ${uploadResult.filename}]\n\nResume content:\n${uploadResult.resumeText}`;
              messageContent = text
                ? `${text}\n\n${resumeContext}`
                : resumeContext;
            }
          } catch (uploadErr) {
            console.error('Upload error:', uploadErr);
            addMessage("Had trouble reading that file — could you try again or just tell me about your background?", 'system');
          }
          clearPendingFile();
        }

        // Detect LinkedIn URL in the message
        const linkedInUrl = detectLinkedInUrl(messageContent);
        if (linkedInUrl) {
          try {
            await captureLinkedIn(linkedInUrl);
            messageContent = messageContent.replace(linkedInUrl, `[Candidate shared their LinkedIn profile: ${linkedInUrl}]`);
          } catch (liErr) {
            console.error('LinkedIn capture error:', liErr);
          }
        }

        // Add to conversation history
        conversationHistory.push({
          role: 'user',
          content: messageContent
        });

        const response = await callAI(conversationHistory);

        hideTyping();

        // Add bot response
        addMessage(response.message, 'bot');

        conversationHistory.push({
          role: 'assistant',
          content: response.message
        });

        // Check if data extraction returned anything
        if (response.extractedData) {
          Object.assign(candidateData, response.extractedData);
        }

        // Check if candidate was disqualified (CT/ATE)
        if (response.disqualified) {
          candidateData.disqualified = true;
          candidateData.disqualifyReason = 'CT/ATE';
          conversationComplete = true;
          setInputEnabled(false);
          await submitCandidateData();
          return;
        }

        // Check if conversation is complete
        if (response.conversationComplete) {
          conversationComplete = true;
          await submitCandidateData();
          setInputEnabled(false);
          return;
        }

      } catch (err) {
        hideTyping();
        console.error('Chat error:', err);
        addMessage("I'm having a little trouble connecting right now. Could you try again in a moment?", 'error');
      }

      isProcessing = false;
      setInputEnabled(true);
    }

    // ============================================
    // AI API CALL
    // ============================================

    async function callAI(messages) {
      const response = await fetch(CONFIG.apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: messages,
          systemPrompt: SYSTEM_PROMPT,
          candidateData: candidateData,
        }),
      });

      if (!response.ok) {
        throw new Error(`API error: ${response.status}`);
      }

      return await response.json();
    }

    // ============================================
    // SUBMIT CANDIDATE DATA
    // ============================================

    async function submitCandidateData() {
      try {
        await fetch(CONFIG.apiUrl.replace('/chat', '/submit-candidate'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            candidateData: candidateData,
            conversationHistory: conversationHistory,
            notifyEmail: CONFIG.notifyEmail,
            timestamp: new Date().toISOString(),
          }),
        });
      } catch (err) {
        console.error('Failed to submit candidate data:', err);
      }
    }

    // ============================================
    // UTILITIES
    // ============================================

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    // Auto-open in standalone mode
    if (!CONFIG.widgetMode) {
      document.getElementById('anura-chat-container').classList.add('standalone');
      document.getElementById('anura-chat-launcher').style.display = 'none';
      if (conversationHistory.length === 0) {
        sendBotGreeting();
      }
    }
  </script>
</body>
</html>
